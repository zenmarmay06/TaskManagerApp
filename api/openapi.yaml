openapi: 3.0.3
info:
  title: Task Manager API
  version: 1.0.0
  description: REST API for Hotel Task Management System

servers:
  - url: http://localhost/Hotel-Management-System-main/api

paths:

  /tasks:
    get:
      summary: Get all tasks
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'

    post:
      summary: Create task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreate'
      responses:
        '200':
          description: Task created

  /tasks/{id}:
    put:
      summary: Update task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpdate'
      responses:
        '200':
          description: Task updated

    delete:
      summary: Delete task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Task deleted

  /tasks/{id}/status:
    patch:
      summary: Update task status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  example: In Progress
      responses:
        '200':
          description: Status updated

  /rooms:
    get:
      summary: Get rooms by status
      parameters:
        - name: status
          in: query
          required: true
          schema:
            type: string
            example: Maintenance
      responses:
        '200':
          description: List of rooms
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /staff:
    get:
      summary: Get staff by work type
      parameters:
        - name: work
          in: query
          required: true
          schema:
            type: string
            example: Cleaner
      responses:
        '200':
          description: List of staff
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

components:
  schemas:

    Task:
      type: object
      properties:
        id:
          type: integer
        roomNo:
          type: string
        priority:
          type: string
        assignedTo:
          type: string
        dueDate:
          type: string
          format: date
        status:
          type: string
        userId:
          type: integer
        note:
          type: string

    TaskCreate:
      type: object
      required:
        - roomNo
        - priority
        - assignedTo
        - dueDate
        - status
        - userId
      properties:
        roomNo:
          type: string
        priority:
          type: string
        assignedTo:
          type: string
        dueDate:
          type: string
          format: date
        status:
          type: string
        userId:
          type: integer
        note:
          type: string

    TaskUpdate:
      type: object
      properties:
        roomNo:
          type: string
        priority:
          type: string
        assignedTo:
          type: string
        dueDate:
          type: string
          format: date
        status:
          type: string
        note:
          type: string